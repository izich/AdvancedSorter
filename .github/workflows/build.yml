name: Build Plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3

    - name: Build
      run: dotnet build --configuration Release

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: AdvancedSorter
        path: bin/Release/net472/AdvancedSorter.dll
