name: Build Plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: msbuild AdvancedSorter.csproj /p:Configuration=Release

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: AdvancedSorter
        path: bin/Release/net472/AdvancedSorter.dll
